<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin inscripciones</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">

  <style>
    body{
      font-family: "League Spartan", Arial, sans-serif;
      margin:0;
      background:#f4f4f4;
      color:#1f1f1f;
    }
    .admin{
      width:min(1100px, calc(100% - 32px));
      margin:40px auto;
    }
    .card{
      background:#fff;
      border-radius:20px;
      padding:24px;
      margin-bottom:20px;
    }
    h1{
      margin:0 0 16px;
      color:#134C99;
    }
    .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    input{
      height:48px;
      padding:0 16px;
      border:1px solid #ccc;
      border-radius:999px;
      font:inherit;
      min-width:260px;
    }
    button{
      height:48px;
      padding:0 20px;
      border:0;
      border-radius:999px;
      font:inherit;
      font-weight:700;
      cursor:pointer;
      background:#134C99;
      color:#fff;
    }
    button.secondary{
      background:#76C5FF;
      color:#134C99;
    }
    #status{
      min-height:22px;
      margin-top:8px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
    }
    th, td{
      text-align:left;
      padding:10px 8px;
      border-bottom:1px solid #e5e5e5;
      font-size:14px;
      vertical-align:top;
    }
    th{
      color:#134C99;
    }
    .hidden{
      display:none;
    }
  </style>
</head>
<body>
  <div class="admin">
    <div class="card" id="loginCard">
      <h1>Admin de inscripciones</h1>
      <div class="row">
        <input type="email" id="adminEmail" placeholder="Correo admin">
        <input type="password" id="adminPassword" placeholder="Contraseña">
        <button id="loginBtn">Ingresar</button>
      </div>
      <div id="status"></div>
    </div>

    <div class="card hidden" id="panelCard">
      <div class="row">
        <button class="secondary" id="loadBtn">Cargar inscripciones</button>
        <button id="exportBtn">Descargar CSV</button>
        <button class="secondary" id="logoutBtn">Cerrar sesión</button>
      </div>

      <table id="dataTable" class="hidden">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Cédula</th>
            <th>Celular</th>
            <th>Correo</th>
            <th>País</th>
            <th>Ciudad</th>
            <th>Profesión</th>
            <th>Institución</th>
            <th>Asistencia</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script type="module" src="assets/js/admin.js?v=1"></script>
</body>
</html>
